<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" fill="none">
  <defs>
    <linearGradient id="c-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1E3A5F"/><stop offset="100%" stop-color="#4A90D9"/></linearGradient>
    <linearGradient id="c-glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.95"/><stop offset="100%" stop-color="white" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="c-user" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1E3A5F"/><stop offset="100%" stop-color="#2D5A8E"/></linearGradient>
    <filter id="c-blur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="c-s1"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F2440" flood-opacity="0.2"/></filter>
    <filter id="c-s2"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F2440" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Background -->
  <ellipse cx="250" cy="220" rx="220" ry="200" fill="#4A90D9" opacity="0.05" filter="url(#c-blur)"/>
  <ellipse cx="100" cy="360" rx="140" ry="100" fill="#1E3A5F" opacity="0.04" filter="url(#c-blur)"/>

  <!-- Chat window -->
  <g filter="url(#c-s1)">
    <rect x="40" y="20" width="420" height="400" rx="24" fill="url(#c-glass)" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
  </g>

  <!-- Header -->
  <rect x="40" y="20" width="420" height="64" rx="24" fill="#0F2440"/>
  <rect x="40" y="60" width="420" height="24" fill="#0F2440"/>
  <rect x="62" y="36" width="40" height="40" rx="12" fill="url(#c-grad)"/>
  <text x="82" y="62" text-anchor="middle" font-size="18" fill="white" font-family="Inter,sans-serif" font-weight="800">AI</text>
  <text x="114" y="52" font-size="14" fill="white" font-family="Inter,sans-serif" font-weight="700">Projekt-KI</text>
  <text x="114" y="68" font-size="9.5" fill="#4A90D9" font-family="Inter,sans-serif" font-weight="500">ERP-Migration Phase 2</text>
  <!-- Online indicator -->
  <circle cx="436" cy="52" r="6" fill="#6BCB77"/>
  <circle cx="436" cy="52" r="10" fill="none" stroke="#6BCB77" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- User message -->
  <g filter="url(#c-s2)">
    <rect x="140" y="104" width="304" height="56" rx="16" fill="url(#c-user)"/>
    <path d="M420 148 L436 156 L420 156Z" fill="url(#c-user)"/>
  </g>
  <text x="162" y="128" font-size="11.5" fill="white" font-family="Inter,sans-serif" font-weight="500">Was wurde zur Schnittstelle</text>
  <text x="162" y="146" font-size="11.5" fill="white" font-family="Inter,sans-serif" font-weight="500">zwischen SAP und CRM entschieden?</text>

  <!-- AI response -->
  <g filter="url(#c-s2)">
    <rect x="56" y="176" width="340" height="192" rx="16" fill="white"/>
    <path d="M80 368 L64 376 L80 376Z" fill="white"/>
  </g>

  <!-- AI avatar in response -->
  <rect x="72" y="192" width="28" height="28" rx="8" fill="url(#c-grad)"/>
  <text x="86" y="211" text-anchor="middle" font-size="12" fill="white" font-family="Inter,sans-serif" font-weight="800">AI</text>
  <text x="108" y="206" font-size="10" fill="#0F172A" font-family="Inter,sans-serif" font-weight="700">KnowKit Projekt-KI</text>
  <text x="108" y="218" font-size="7" fill="#94A3B8" font-family="Inter,sans-serif">Jetzt</text>

  <!-- Response content -->
  <text x="72" y="242" font-size="10.5" fill="#475569" font-family="Inter,sans-serif">Im Workshop vom <tspan font-weight="700" fill="#0F172A">12. März</tspan> wurde entschieden:</text>

  <!-- Bullet points with colored dots -->
  <circle cx="80" cy="261" r="3" fill="#4A90D9"/>
  <text x="90" y="265" font-size="10" fill="#475569" font-family="Inter,sans-serif">REST-API v2 mit OAuth2</text>

  <circle cx="80" cy="281" r="3" fill="#4A90D9"/>
  <text x="90" y="285" font-size="10" fill="#475569" font-family="Inter,sans-serif">Echtzeit-Sync alle 15 Minuten</text>

  <circle cx="80" cy="301" r="3" fill="#4A90D9"/>
  <text x="90" y="305" font-size="10" fill="#475569" font-family="Inter,sans-serif">Fallback auf Batch bei Timeout</text>

  <text x="72" y="328" font-size="10" fill="#475569" font-family="Inter,sans-serif">Verantwortlich: <tspan font-weight="700" fill="#0F172A">Thomas M.</tspan></text>

  <!-- Source card -->
  <rect x="72" y="340" width="240" height="32" rx="10" fill="#F0F4F8" stroke="#4A90D9" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="92" cy="356" r="10" fill="url(#c-grad)"/>
  <path d="M89 353 L96 356 L89 359Z" fill="white"/>
  <text x="108" y="354" font-size="8.5" fill="#0F172A" font-family="Inter,sans-serif" font-weight="600">Meeting 12.03.</text>
  <text x="108" y="366" font-size="7.5" fill="#94A3B8" font-family="Inter,sans-serif">Zeitstempel: 00:34:12</text>
  <rect x="264" y="346" width="40" height="20" rx="10" fill="#4A90D9" opacity="0.1"/>
  <text x="284" y="360" text-anchor="middle" font-size="7.5" fill="#4A90D9" font-family="Inter,sans-serif" font-weight="700">Quelle</text>

  <!-- Input field -->
  <g filter="url(#c-s2)">
    <rect x="56" y="392" width="388" height="44" rx="14" fill="white" stroke="#E1E8EF" stroke-width="1.5"/>
  </g>
  <text x="80" y="418" font-size="11" fill="#94A3B8" font-family="Inter,sans-serif">Fragen Sie etwas zum Projekt...</text>
  <rect x="404" y="400" width="28" height="28" rx="14" fill="url(#c-grad)"/>
  <text x="418" y="419" text-anchor="middle" font-size="14" fill="white" font-family="Inter,sans-serif" font-weight="600">&#8593;</text>
</svg>
